<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hex to RGB Converter</title>
  </head>
  <body>
    <h1>Hex to RGB Converter</h1>
    <p>This example converts a hexadecimal color string into RGB values.</p>
    <p>It supports both full hex codes like <code>#ff33ff</code> and shorthand hex like <code>#f3f</code>, and returns the original hex string as well.</p>
    <script>
      // Convert a hex color like "#ff33ff" or "#f3f" into an RGB object,
      // and also keep the original hex string for display.
      const hexToRGB = (hexString) => {
        const hex = hexString;
        let rString;
        let gString;
        let bString;

        if (hex.length === 4) {
          // For shorthand hex like "#f3f", duplicate each digit:
          // "f" -> "ff", "3" -> "33" and so on.
          rString = hex.slice(1, 2) + hex.slice(1, 2);
          gString = hex.slice(2, 3) + hex.slice(2, 3);
          bString = hex.slice(3, 4) + hex.slice(3, 4);
        } else if (hex.length === 7) {
          // For full hex like "#ff33ff".
          rString = hex.slice(1, 3);
          gString = hex.slice(3, 5);
          bString = hex.slice(5, 7);
        } else {
          throw new Error('Hex string must be 4 or 7 characters long, including #');
        }

        // parseInt(string, 16) converts a hexadecimal string into a decimal number.
        // In hex, "ff" = 255, "00" = 0, "7f" = 127, etc.
        // The second argument 16 tells parseInt to read the string as base 16.
        const r = parseInt(rString, 16);                    
        const g = parseInt(gString, 16);
        const b = parseInt(bString, 16);

        return { hex, r, g, b };
      };

      console.log(hexToRGB("#ff33ff"));
      console.log(hexToRGB("#f3f"));
    </script>
  </body>
</html>
